name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: pnpm install --shamefully-hoist
      
      - name: Install Expo CLI globally
        run: pnpm add -g expo-cli
      
      - name: Clean Gradle cache
        run: |
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle
          cd android && ./gradlew clean
      
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install
      
      - name: Build APK
        run: |
          cd android
          ./gradlew clean assembleRelease --stacktrace --info
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: android/app/build/outputs/apk/release/app-release.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Jarvis APK Build ${{ github.run_number }}
          body: |
            Jarvis AI Assistant APK
            
            Download the APK file below and install on your iQOO Neo 10R
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
