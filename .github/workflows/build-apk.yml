name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install Android SDK & components
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          curl -fL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools-temp
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools-temp/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Expo CLI globally
        run: npm install -g expo-cli
      
      - name: Make gradlew executable
        run: chmod +x android/gradlew || true

      - name: Verify Java and Gradle
        run: |
          java -version
          if [ -d "android" ]; then
            cd android
            ./gradlew -v || echo "Gradle not found or failed"
          else
            echo "Android directory not found"
          fi

      - name: Clean Gradle cache
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
        run: |
          rm -rf $GRADLE_USER_HOME/caches || true
          rm -rf android/.gradle || true
          if [ -d "android" ]; then
            cd android
            ./gradlew clean || echo "Clean failed"
          fi

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK (debug logs saved)
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --debug > build-gradle.log 2>&1 || (tail -n 200 build-gradle.log && exit 1)
          echo "==== Gradle log tail ===="
          tail -n 200 build-gradle.log || true

      - name: Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android/build-gradle.log
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: android/app/build/outputs/apk/release/app-release.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Jarvis APK Build ${{ github.run_number }}
          body: |
            Jarvis AI Assistant APK
            
            Download the APK file below and install on your iQOO Neo 10R
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
