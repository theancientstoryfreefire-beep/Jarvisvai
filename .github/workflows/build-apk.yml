name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install Android SDK & components
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          curl -fL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools-temp
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools-temp/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle wrapper & user home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper/dists
            ${{ runner.temp }}/.gradle
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-wrapper-${{ runner.os }}-
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Expo CLI globally
        run: npm install -g expo-cli
      
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Install expo-build-properties
        run: npm install expo-build-properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew || true

      - name: Ensure debug keystore
        run: |
          if [ ! -f "android/app/debug.keystore" ]; then
            echo "Generating debug keystore..."
            keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Debug keystore already exists."
          fi

      - name: Build APK (debug logs saved)
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
          JAVA_TOOL_OPTIONS: "-Xmx8192m"
        run: |
          cd android
          ./gradlew --stop || true
          echo "org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8" >> gradle.properties
          chmod +x ./gradlew || true
          ./gradlew assembleRelease --no-daemon --no-parallel --stacktrace --debug > build-gradle.log 2>&1 || (echo "==== Build failed: full gradle log ====" && cat build-gradle.log && exit 1)
          echo "==== Gradle log tail ===="
          tail -n 200 build-gradle.log || true

      - name: Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android/build-gradle.log
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: android/app/build/outputs/apk/release/app-release.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Jarvis APK Build ${{ github.run_number }}
          body: |
            Jarvis AI Assistant APK
            
            Download the APK file below and install on your iQOO Neo 10R
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
